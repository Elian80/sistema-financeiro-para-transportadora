<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0B0F1A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Financeiro" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Projeto Financeiro</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="brand">
          <div class="brand-icon">F</div>
          <div class="brand-copy">
            <h1>Financeiro</h1>
            <p>Gestao operacional</p>
          </div>
        </div>
        <button class="sidebar-toggle" id="sidebar-toggle-btn" type="button" aria-label="Alternar menu lateral" title="Alternar menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-page="dashboard" data-short="DB" data-icon="layout-dashboard">Dashboard</button>
        <button class="nav-btn" data-page="veiculos" data-short="VE" data-icon="truck">Veiculos</button>
        <button class="nav-btn" data-page="motoristas" data-short="MO" data-icon="users">Motoristas</button>
        <button class="nav-btn" data-page="planoContas" data-short="PC" data-icon="list-tree">Plano de contas</button>
        <button class="nav-btn" data-page="lancamentos" data-short="LA" data-icon="receipt">Lancamentos</button>
        <button class="nav-btn" data-page="contasReceber" data-short="CR" data-icon="wallet-cards">Contas a receber</button>
        <button class="nav-btn" data-page="relatorios" data-short="RE" data-icon="chart-no-axes-combined">Relatorios</button>
        <button class="nav-btn" data-page="ativosPassivos" data-short="AP" data-icon="scale">Ativos/Passivos</button>
        <button class="nav-btn" data-page="estoque" data-short="ES" data-icon="package">Estoque</button>
        <button class="nav-btn" data-page="mapa" data-short="MA" data-icon="map">Mapa</button>
      </nav>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <button class="mobile-menu-btn" id="mobile-menu-btn" type="button" aria-label="Abrir menu lateral">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="page-heading">
          <h2 id="page-title">Dashboard</h2>
          <p id="page-subtitle">Visao geral da operacao e do financeiro</p>
        </div>

        <div class="topbar-search" role="search">
          <span data-lucide="search">Buscar</span>
          <input id="global-search" type="search" placeholder="Buscar no sistema..." />
        </div>

        <div class="topbar-actions">
          <button class="ghost-btn install-pwa-btn" id="install-pwa-btn" type="button" hidden>Instalar app</button>
          <button class="icon-btn notification-btn" id="notification-btn" type="button" aria-label="Notificacoes" title="Notificacoes">
            <span data-lucide="bell">!</span>
          </button>
          <button class="icon-btn settings-btn" id="settings-btn" type="button" aria-label="Configuracoes e tema" title="Configuracoes e tema">
            <span data-lucide="settings">&#9881;</span>
          </button>
          <div class="user-avatar" title="Usuario">J</div>
          <button class="ghost-btn" id="logout-btn">Sair</button>
        </div>
      </header>

      <section id="page-content" class="page-content"></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="app.js?v=15"></script>
  <script src="pwa.js?v=11"></script>
</body>
</html>
