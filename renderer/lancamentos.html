<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lançamentos</title>
  <link rel="stylesheet" href="lancamentos.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">F</div>
        <div>
          <h1>Financeiro</h1>
          <p>Módulo de lançamentos</p>
        </div>
      </div>

      <div class="menu-box">
        <button class="menu-btn active">Lançamentos</button>
        <button class="menu-btn">Conferência</button>
      </div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div>
          <h2>Lançamentos</h2>
          <p>Cadastro, conferência e filtros</p>
        </div>
      </header>

      <section class="content-grid">
        <div class="panel">
          <h3>Novo lançamento</h3>

          <form id="form-lancamento" class="form-grid">
            <div class="field full">
              <label for="classificacao">Classificação</label>
              <select id="classificacao" required>
                <option value="">Selecione...</option>
              </select>
            </div>

            <div class="field full">
              <label for="descricao">Descrição</label>
              <input type="text" id="descricao" placeholder="Digite a descrição" required />
            </div>

            <div class="field">
              <label for="valor">Valor</label>
              <input type="number" id="valor" step="0.01" placeholder="0.00" required />
            </div>

            <div class="field">
              <label for="data">Data</label>
              <input type="date" id="data" required />
            </div>

            <div class="field full">
              <button type="submit" class="primary-btn">Salvar lançamento</button>
            </div>
          </form>

          <p id="mensagem" class="mensagem"></p>
        </div>

        <div class="panel">
          <h3>Filtros</h3>

          <div class="form-grid">
            <div class="field full">
              <label for="filtro-classificacao">Classificação</label>
              <select id="filtro-classificacao">
                <option value="">Todas</option>
              </select>
            </div>

            <div class="field">
              <label for="filtro-data-inicial">Data inicial</label>
              <input type="date" id="filtro-data-inicial" />
            </div>

            <div class="field">
              <label for="filtro-data-final">Data final</label>
              <input type="date" id="filtro-data-final" />
            </div>

            <div class="field full">
              <label for="filtro-descricao">Descrição</label>
              <input type="text" id="filtro-descricao" placeholder="Buscar descrição" />
            </div>

            <div class="field full btn-row">
              <button id="btn-filtrar" class="ghost-btn" type="button">Filtrar</button>
              <button id="btn-limpar" class="ghost-btn" type="button">Limpar filtros</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel table-panel">
        <div class="table-header">
          <h3>Conferência de lançamentos</h3>
          <span id="total-registros">0 registros</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Data</th>
                <th>Classificação</th>
                <th>Descrição</th>
                <th>Valor</th>
              </tr>
            </thead>
            <tbody id="tabela-lancamentos">
              <tr>
                <td colspan="5" class="empty-row">Nenhum lançamento encontrado.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="lancamentos.js"></script>
</body>
</html>
